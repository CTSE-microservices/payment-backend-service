name: Payment Service CI

on:
  push:
    branches:
      - ft/stripe
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker buildx build --platform linux/amd64 -t payment-service:ci --load .
